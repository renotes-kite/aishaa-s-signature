<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aurelian Jewels | Payment</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body data-page="payment" class="fade-page">
    <header class="site-header">
      <nav class="container nav-bar" aria-label="Main navigation">
        <a class="logo" href="index.html">Aurelian Jewels</a>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="index.html#collections" class="active">Collections</a></li>
          <li><a href="index.html#about">About</a></li>
        </ul>
      </nav>
    </header>

    <main class="container checkout-layout">
      <section class="order-summary card" id="orderSummary"></section>

      <section class="payment-section card">
        <h2>Payment Details</h2>
        <form id="paymentForm" novalidate>
          <label>
            Full Name
            <input type="text" id="fullName" required />
          </label>
          <label>
            Email
            <input type="email" id="email" required />
          </label>
          <label>
            Shipping Address
            <textarea id="address" rows="3" required></textarea>
          </label>

          <div class="inline-fields">
            <label>
              Card Number
              <input type="text" id="cardNumber" maxlength="19" required />
            </label>
          </div>

          <div class="inline-fields two-up">
            <label>
              Expiry
              <input type="text" id="expiry" maxlength="5" placeholder="MM/YY" required />
            </label>
            <label>
              CVV
              <input type="password" id="cvv" maxlength="4" required />
            </label>
          </div>

          <button type="submit" class="btn">Complete Purchase</button>
          <p id="formMessage" class="form-message" role="status"></p>
        </form>
      </section>
    </main>

    <script src="js/script.js"></script>
  </body>
</html>
